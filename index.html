<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nusa Travel OS v7 · Indonesia</title>
  <meta name="theme-color" content="#04170f" />
  <meta name="description" content="App visual paginada para planificar Indonesia: guía tipo revista, mapa 3D, itinerario, hoteles, actividades, transportes, comidas y zona Iria & Izan." />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app" id="app">
    <header class="topbar">
      <button class="brand" data-go="cover" aria-label="Inicio">
        <span class="brand-icon">N</span>
        <span><b>Nusa Travel OS</b><small>Indonesia visual guide</small></span>
      </button>
      <nav class="nav" aria-label="Secciones">
        <button data-go="cover">Portada</button>
        <button data-go="guide">Guía</button>
        <button data-go="map">Mapa 3D</button>
        <button data-go="itinerary">Días</button>
        <button data-go="bookings">Reservas</button>
        <button data-go="kids">Iria & Izan</button>
        <button data-go="final">Final</button>
      </nav>
      <button class="jungle" id="jungleBtn">Selva ON</button>
    </header>

    <main class="viewport">
      <section class="screen active" id="screen-cover"></section>
      <section class="screen" id="screen-guide"></section>
      <section class="screen" id="screen-map"></section>
      <section class="screen" id="screen-itinerary"></section>
      <section class="screen" id="screen-bookings"></section>
      <section class="screen" id="screen-kids"></section>
      <section class="screen" id="screen-final"></section>
    </main>

    <footer class="pager">
      <button class="pager-btn muted" id="prevBtn">Anterior</button>
      <div class="dots" id="dots"></div>
      <button class="pager-btn" id="nextBtn">Siguiente</button>
    </footer>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="js/app.js"></script>
</body>
</html>
