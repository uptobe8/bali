<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nusa Travel OS · Indonesia</title>
  <meta name="theme-color" content="#05140e" />
  <meta name="description" content="Aplicación visual de viaje a Indonesia con guía paginada, mapa interactivo, itinerario, reservas, ideas de Iria e Izan y decisión final." />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIINfQ2AT7M2aVtly4UdsX1tZVfMI5HRGZo=" crossorigin="" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <button class="brand" data-go="home" aria-label="Inicio">
        <span class="brand-icon">N</span>
        <span><strong>Nusa Travel OS</strong><small>Indonesia visual guide</small></span>
      </button>
      <nav class="top-nav" aria-label="Páginas">
        <button data-go="home">Inicio</button>
        <button data-go="guide">Guía</button>
        <button data-go="map">Mapa</button>
        <button data-go="days">Días</button>
        <button data-go="bookings">Reservas</button>
        <button data-go="ideas">Iria & Izan</button>
        <button data-go="final">Final</button>
      </nav>
      <button class="sound-toggle" id="soundToggle">Selva ON</button>
    </header>

    <main class="viewport" id="viewport">
      <section class="screen active" id="home"></section>
      <section class="screen" id="guide"></section>
      <section class="screen" id="map"></section>
      <section class="screen" id="days"></section>
      <section class="screen" id="bookings"></section>
      <section class="screen" id="ideas"></section>
      <section class="screen" id="final"></section>
    </main>

    <footer class="app-pager">
      <button class="pager-btn ghost" id="prevScreen">Anterior</button>
      <div class="dots" id="dots"></div>
      <button class="pager-btn" id="nextScreen">Siguiente</button>
    </footer>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="js/app.js"></script>
</body>
</html>
