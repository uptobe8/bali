name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect static output
        shell: bash
        run: |
          set -e
          if [ -f "index.html" ]; then
            echo "PUBLISH_DIR=." >> "$GITHUB_ENV"
          elif [ -d "out" ] && [ -f "out/index.html" ]; then
            echo "PUBLISH_DIR=out" >> "$GITHUB_ENV"
          elif [ -d "dist" ] && [ -f "dist/index.html" ]; then
            echo "PUBLISH_DIR=dist" >> "$GITHUB_ENV"
          elif [ -d "build" ] && [ -f "build/index.html" ]; then
            echo "PUBLISH_DIR=build" >> "$GITHUB_ENV"
          else
            echo "No static index.html found in ., out, dist or build" >&2
            exit 1
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.PUBLISH_DIR }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
